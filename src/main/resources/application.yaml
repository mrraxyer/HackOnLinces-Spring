spring:
  application:
    name: HackOnLinces

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:30MB}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:cambia-este-secreto-en-produccion-minimo-256-bits}
    expiration-ms: ${JWT_EXPIRATION:86400000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

  upload:
    dir: ${UPLOAD_DIR:uploads}

  submission:
    max-attempts: ${SUBMISSION_MAX_ATTEMPTS:5}

  internal-domain: ${INTERNAL_EMAIL_DOMAIN:itcelaya.edu.mx}