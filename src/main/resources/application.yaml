spring:
  application:
    name: HackOnLinces

  # El perfil activo se puede sobreescribir con la variable de entorno SPRING_PROFILES_ACTIVE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA compartido: el dialecto y el comportamiento base
  jpa:
    open-in-view: false          # Evita el antipatrón de sesión abierta en la vista
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # Subida de archivos
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:30MB}

# Puerto configurable por variable de entorno
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

# Actuator: solo health e info expuestos por defecto
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Configuración propia del sistema
app:
  jwt:
    secret: ${JWT_SECRET:cambia-este-secreto-en-produccion-minimo-256-bits}
    expiration-ms: ${JWT_EXPIRATION:86400000}   # 24 horas por defecto

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  upload:
    dir: ${UPLOAD_DIR:uploads}

  submission:
    max-attempts: ${SUBMISSION_MAX_ATTEMPTS:3}

  internal-domain: ${INTERNAL_EMAIL_DOMAIN:itcelaya.edu.mx}