spring:
  datasource:
    # Inyección directa desde el entorno. Dependemos 100% de las variables generadas por el script o el compose.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      # Tuning del pool. 10 es un buen inicio; la regla general es: (núcleos_cpu * 2) + discos_efectivos.
      maximum-pool-size: 10
      minimum-idle: 2
      # Previene conexiones "colgadas" y fugas de memoria si hay microcortes en la red de Docker.
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      # Riesgo en producción. Idealmente usar Flyway/Liquibase y poner esto en 'validate'.
      # Se deja dinámico con fallback a 'update' asumiendo iteraciones rápidas.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            # Le agregamos un valor por defecto (después de los dos puntos)
            client-id: ${GOOGLE_CLIENT_ID:google-client-id-no-configurado}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret-no-configurado}
            scope:
              - email
              - profile

springdoc:
  # Deshabilitar Swagger en producción reduce drásticamente la superficie de ataque para bots y escáneres.
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    # Minimizar el I/O de logs en producción para no saturar el disco del contenedor ni degradar rendimiento.
    mx.itcelaya.hackonlinces: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

app:
  jwt:
    secret: ${APP_JWT_SECRET:cambia-este-secreto-en-produccion-minimo-256-bits}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

  upload:
    dir: ${UPLOAD_DIR:uploads}

  submission:
    max-attempts: ${SUBMISSION_MAX_ATTEMPTS:5}

  internal-domain: ${INTERNAL_EMAIL_DOMAIN:itcelaya.edu.mx}