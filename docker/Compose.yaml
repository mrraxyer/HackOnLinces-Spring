services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hackonlinces
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hackonlinces_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - hackonlinces-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackonlinces"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/hackonlinces
      DB_USERNAME: postgres
      DB_PASSWORD: hackonlinces_pass_2024
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-en-produccion-minimo-256-bits}
      JWT_EXPIRATION: 86400000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      INTERNAL_EMAIL_DOMAIN: itcelaya.edu.mx
      MAX_FILE_SIZE: 10MB
      MAX_REQUEST_SIZE: 30MB
      UPLOAD_DIR: /app/uploads
      PORT: 8080
      SUBMISSION_MAX_ATTEMPTS: 5
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - hackonlinces-net

networks:
  hackonlinces-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: