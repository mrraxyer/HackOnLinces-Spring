services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hackonlinces}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-hackonlinces_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - hackonlinces-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-postgres} -d ${POSTGRES_DB:-hackonlinces}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      # Sube un nivel a la raíz del repositorio para encontrar el código y el Dockerfile
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Sincronizado con Postgres y el entrypoint
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-hackonlinces}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-hackonlinces_pass_2024}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: 86400000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      INTERNAL_EMAIL_DOMAIN: itcelaya.edu.mx
      MAX_FILE_SIZE: 10MB
      MAX_REQUEST_SIZE: 30MB
      UPLOAD_DIR: /app/uploads
      PORT: 8080
      SUBMISSION_MAX_ATTEMPTS: 5
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - hackonlinces-net

networks:
  hackonlinces-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: